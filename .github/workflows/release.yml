name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  github-release:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend
        run: cd ui && npm ci --no-audit --no-fund && npm run build

      - name: Build binaries
        env:
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
          DATE: ${{ github.event.head_commit.timestamp }}
        run: |
          PKG=github.com/iulita-ai/iulita/internal/version
          FLAGS="-s -w -X ${PKG}.Version=${VERSION} -X ${PKG}.Commit=${COMMIT} -X ${PKG}.Date=${DATE}"

          GOOS=linux   GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="${FLAGS}" -o iulita-linux-amd64       ./cmd/iulita/
          GOOS=linux   GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="${FLAGS}" -o iulita-linux-arm64       ./cmd/iulita/
          GOOS=darwin  GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="${FLAGS}" -o iulita-darwin-arm64      ./cmd/iulita/
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="${FLAGS}" -o iulita-windows-amd64.exe ./cmd/iulita/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            iulita-linux-amd64
            iulita-linux-arm64
            iulita-darwin-arm64
            iulita-windows-amd64.exe
